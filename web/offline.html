<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#070a12" />
  <title>Offline — Yukti</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      font-family: "DM Sans", system-ui, sans-serif;
      background: #070a12;
      color: #e8ecf4;
      text-align: center;
    }
    h1 { font-size: 1.35rem; margin: 0 0 0.5rem; }
    p { color: #94a3b8; margin: 0 0 1.25rem; line-height: 1.5; }
    button {
      min-height: 48px;
      padding: 0.75rem 1.25rem;
      border: none;
      border-radius: 0.65rem;
      background: linear-gradient(135deg, #0891b2, #7c3aed);
      color: #fff;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div>
    <h1>You&apos;re offline</h1>
    <p>Yukti needs a network connection for chat and voice. Reconnect and try again.</p>
    <button type="button" onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
