<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#070a12" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Yukti" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png" />
  <title>Sign in — Yukti</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/login.css" />
</head>
<body>
  <main class="login">
    <div class="login__card">
      <p class="login__brand">Yukti</p>
      <h1 class="login__title">Sign in to continue</h1>
      <p class="login__subtitle">Voice assistant by Bizfy Solution</p>

      <form class="login__form" id="loginForm" method="post" action="/auth/login/form">
        <label class="login__field">
          <span>Username</span>
          <input type="text" name="username" id="username" autocomplete="username" required />
        </label>
        <label class="login__field">
          <span>Password</span>
          <input type="password" name="password" id="password" autocomplete="current-password" required />
        </label>
        <button type="submit" class="login__submit">Sign in</button>
      </form>

      <p class="login__divider" aria-hidden="true"><span>or</span></p>

      <a class="login__google" id="googleBtn" href="/auth/google">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </a>

      <p class="login__hint" id="loginHint" hidden></p>
      <p class="login__footer">Add <code>GOOGLE_CLIENT_ID</code> and <code>GOOGLE_CLIENT_SECRET</code> to <code>.env</code>, or set <code>AUTH_DISABLED=1</code> for local dev.</p>
    </div>
  </main>
  <script src="/static/js/pwa.js"></script>
  <script src="/static/js/login.js"></script>
</body>
</html>
